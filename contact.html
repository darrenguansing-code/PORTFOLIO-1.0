<main class="contact-page" id="contact-section">
    <div class="contact-card">
        <span class="eyebrow">Let&apos;s Connect</span>
        <h1>Get in touch for collaboration, questions, or ideas.</h1>
        <p>Send a quick message and I’ll respond as soon as possible.</p>

        <form onsubmit="return validateForm()">
            <label class="form-label" for="name">Your Name / Company Name </label>
            <input class="form-input" type="text" id="name" placeholder="Enter your name">

            <label class="form-label" for="email">Your Email</label>
            <input class="form-input" type="email" id="email" placeholder="Enter your email">

            <button type="submit" class="btn btn-primary">Send Message</button>
            <p id="error" class="form-error"></p>
        </form>
    </div>
</main>

<script src="js/script.js"></script>
